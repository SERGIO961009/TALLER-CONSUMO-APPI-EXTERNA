<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>app clima</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search-bar">
            <input type="text" placeholder="ingrese la ciudad....." spellchech="false" >
            <button ><img src="/images/search.png" alt=""></button>

        </div>
        <div class="error">
            <p>nombre de ciudad invalido</p>
        </div>
        <div class="weather">
            <img src="/images/rain.png" alt="" class="weather-icon">
            <h1 class="temp">23 &deg;C
            </h1>
            <h2 class="city">Lima</h2>
            <div class="details"></div>
            <div class="col"><img src="/images/humidity.png" alt=""></div>
            <div>
                <p class="humidity">50%</p>
                <p>Humedad</p>
            </div>
            <div class="col">
                <img src="/images/wind.png" alt="">
                <div>
                    <p class="wind">120KM/H</p>
                    <p>velocidad del viento</p>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
